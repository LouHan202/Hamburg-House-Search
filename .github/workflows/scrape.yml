name: Scrape Hamburg listings

on:
  schedule:
    # Runs daily at 06:00 UTC (08:00 Hamburg time in summer, 07:00 in winter)
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit the updated data file

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

           - name: Run scraper
        run: python run_all.py

      - name: Copy data for GitHub Pages
        run: |
          mkdir -p docs/data
          cp data/listings.json docs/data/listings.json

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update listings data"
          file_pattern: data/listings.json docs/data/listings.json
